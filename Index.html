<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Le mie GitHub Pages</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: #00ff88;
    font-family: "Courier New", monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* TITOLO */
h1 {
    margin-top: 50px;
    font-size: 36px;
    text-align: center;
    text-shadow: 0 0 10px #00ff88;
}

/* CONTENITORE LINK */
.links {
    margin-top: 50px;
    width: 80%;
    max-width: 500px;
}

/* LINK STILE CARD */
.link {
    display: block;
    text-decoration: none;
    color: #00ff88;
    background: #111;
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
    border: 1px solid #00ff88;
    transition: 0.2s;
}

/* HOVER */
.link:hover {
    background: #00ff88;
    color: black;
    transform: scale(1.03);
}
</style>
</head>

<body>

<h1>Le mie GitHub Pages</h1>

<div class="links">
    <a class="link" href="https://demenigeco.github.io/dsapps" target="_blank">
        DomePrograms
    </a>

    <a class="link" href="https://demenigeco.github.io/LucertolaOS" target="_blank">
        LucertolaOS
    </a>

    <a class="link" href="https://demenigeco.github.io/HelloOS" target="_blank">
        HelloOS
    </a>

    <a class="link" href="https://demenigeco.github.io/mcOS" target="_blank">
        mcOS
    </a>
</div>

</body>
</html>
